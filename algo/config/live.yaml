# ============================================================================
# Bot d'exécution — Phase 1 : PAPER TRADING OBLIGATOIRE.
#
# mode: paper  -> ordres simulés localement, données réelles (aucun ordre broker)
# mode: demo   -> ordres réels sur compte de démonstration IG (IG_ENV=demo)
# mode: live   -> VERROUILLÉ : exige EN PLUS la variable d'environnement
#                 GOLDSILVER_LIVE_ACK=JE-COMPRENDS-ARGENT-REEL et le flag CLI
#                 --enable-live. Une condition manquante = refus de démarrer.
#
# Identifiants (JAMAIS ici, uniquement en variables d'environnement) :
#   IG_API_KEY, IG_IDENTIFIER, IG_PASSWORD, IG_ENV=demo|live
#   IG_ACCOUNT_ID (optionnel — sinon compte "préféré")
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID (optionnel)
# ============================================================================

mode: demo

# La stratégie VALIDÉE (ROBUSTE 6/7) — réutilisée telle quelle, pas recodée.
strategy_config: "config/breakout_4h.yaml"

poll:
  granularity_hours: 4          # décision à la clôture de chaque bougie 4h
  delay_after_close_seconds: 90 # marge pour que le broker publie la bougie
  history_hours: 3000           # H1 chargées à chaque cycle (warmup indicateurs)
  max_signal_age_bars: 4        # un signal 1h plus vieux que ça n'est plus pris

broker:
  adapter: "ig"                 # IG Markets (REST) ; autre broker = nouvel adaptateur
  # actif interne -> epic IG. VÉRIFIER ces epics sur VOTRE compte :
  #   goldsilver-live find-epic or   /   goldsilver-live find-epic argent
  # (ceux ci-dessous sont les CFD spot "cash" usuels, à confirmer).
  instruments:
    XAUUSD: "CS.D.CFEGOLD.CEF.IP"      # "Spot Gold ($1)" — CONFIRMÉ tradeable
    XAGUSD: "CS.D.CFDSILVER.CFM.IP"    # "Argent au comptant mini (500oz)" — CONFIRMÉ
  ig:
    # Valeurs CONFIRMÉES via GET /markets/{epic} sur le compte CFD démo (Z5MVJV).
    contracts:
      "CS.D.CFEGOLD.CEF.IP":
        oz_per_contract: 1.0           # Spot Gold ($1) : 1 contrat = 1 oz (1 pt = $1)
        min_contracts: 0.1             # minDealSize IG
        contract_step: 0.1
        level_decimals: 2              # 2 décimales (bid ~4063.72)
      "CS.D.CFDSILVER.CFM.IP":
        oz_per_contract: 500.0         # mini : 1 contrat = 500 oz (1 pip = $0.01/oz -> $5)
        min_contracts: 0.1
        contract_step: 0.1
        level_decimals: 3              # 3 décimales (bid ~58.528)

risk:
  # Plafond DUR du moteur : 4 % par trade (relevé de 2 % à 4 % sur décision
  # explicite — voir l'en-tête de live/risk.py). Mettre plus REFUSE de démarrer.
  # COÛT MESURÉ de ce doublement (stratégie métaux, reports/portfolio_analysis) :
  #   2 %/trade -> +0.9 %/mois, max drawdown ~40 %
  #   4 %/trade -> +2.0 %/mois, max drawdown ~67 %
  # À 4 %/trade le vrai filet n'est plus le plafond mais les kill switches :
  # -20 % de drawdown ou -5 % sur la journée haltent le bot (2 stops le même
  # jour = -8 % => halte). Concurrence : or + argent à 4 % = 8 % de risque
  # total ouvert (ils sont corrélés à 0.79 : ~un seul pari doublé).
  risk_pct: 0.04                # 4 % par trade = plafond dur (doublé)
  max_open_risk_pct: 0.08       # or + argent en même temps (2 x 4 %)
  min_rr: 3.0                   # aucun ordre si TP/SL < 1:3

regime:
  # Critère documenté dans live/regime.py (issu du test de detrending) :
  # close > EMA(trend_ema) 4h ET pente EMA >= min_slope_pct sur slope_lookback
  # ET Efficiency Ratio >= er_min. Sinon : pause (aucune nouvelle entrée).
  trend_ema: 100
  slope_lookback_bars: 30
  min_slope_pct: 0.0
  use_efficiency_ratio: true
  er_window_bars: 60
  er_min: 0.20

kill:
  daily_loss_limit_pct: 0.05    # -5 % sur la journée -> flatten + halte
  max_drawdown_pct: 0.20        # -20 % depuis le plus-haut -> flatten + halte
  max_consecutive_losses: 6     # 6 pertes d'affilée -> flatten + halte
  kill_file: "KILL"             # créer ce fichier (racine algo/) = arrêt manuel

paths:
  state: "live_state/state.json"
  journal: "live_state/journal.jsonl"

notify:
  telegram: true                # no-op si les variables d'env sont absentes

paper:
  initial_equity: 31703.0        # calé sur le solde du compte CFD démo (forward test réaliste)

slippage_alert_r: 0.05          # alerte si le coût d'exécution moyen dépasse 5 % de R

# Attentes du backtest pour le rapport de forward test (comparaison continue)
expectations_path: "reports/summary_20260723_0053.json"
